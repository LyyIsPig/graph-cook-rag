# 一键部署：Neo4j + Milvus + Redis + 自动灌数据 + 应用
# 用法：
#   1. cp code/.env.example code/.env  并填入 LLM_API_KEY（智谱 GLM）
#   2. docker compose up -d --build
#   3. 浏览器打开 http://localhost:8000
# 首次构建会拉 torch + 烤 BGE 模型，镜像约 2-3GB，需要联网；之后启动很快。

services:
  # ============ Neo4j 知识图谱 ============
  neo4j:
    image: neo4j:5.18
    container_name: graph-rag-neo4j
    environment:
      - NEO4J_AUTH=neo4j/all-in-rag
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"   # 浏览器管理界面
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - ./data/cypher:/var/lib/neo4j/import:ro   # 种子数据挂进 import 目录
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p all-in-rag 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============ 一次性灌数据（等 Neo4j 起来后导入知识图谱，幂等）============
  seed:
    image: neo4j:5.18
    container_name: graph-rag-seed
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data/cypher:/cypher:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "[seed] 等待 Neo4j 就绪..."
        until cypher-shell -a bolt://neo4j:7687 -u neo4j -p all-in-rag "RETURN 1" >/dev/null 2>&1; do
          sleep 2
        done
        COUNT=$$(cypher-shell -a bolt://neo4j:7687 -u neo4j -p all-in-rag "MATCH (n) RETURN count(n) AS c" 2>/dev/null | grep -oE '[0-9]+' | tail -1)
        echo "[seed] 当前节点数: $${COUNT:-0}"
        if [ "$${COUNT:-0}" = "0" ]; then
          echo "[seed] 导入知识图谱..."
          cypher-shell -a bolt://neo4j:7687 -u neo4j -p all-in-rag --file /cypher/neo4j_import.cypher
          echo "[seed] 导入完成"
        else
          echo "[seed] 数据已存在，跳过导入"
        fi
    restart: "no"

  # ============ Milvus 向量库（etcd + minio + standalone）============
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    image: milvusdb/milvus:v2.5.11
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  # ============ Redis（缓存 + 限流）============
  redis:
    image: redis:7-alpine
    container_name: graph-rag-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ 应用（FastAPI + 工坊前端）============
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graph-rag-app
    env_file:
      - code/.env          # LLM_API_KEY 等（本地文件，不入库）
    environment:
      # 用 compose 服务名覆盖 .env 里的 localhost
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=all-in-rag
      - MILVUS_HOST=standalone
      - MILVUS_PORT=19530
      - REDIS_HOST=redis
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      standalone:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  neo4j_data:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
